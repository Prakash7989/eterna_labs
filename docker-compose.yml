services:
  mysql:
    image: mysql:8.4
    container_name: eterna-matchmaker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: matchmaker
      MYSQL_USER: matchmaker
      MYSQL_PASSWORD: matchmaker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./matchmaker/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umatchmaker", "-pmatchmaker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
